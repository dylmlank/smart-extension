<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    :root {
      --bg: #ffffff; --fg: #1a1a1a; --muted: #6b7280;
      --card: #f4f4f5; --border: #e4e4e7; --accent: #4f46e5;
    }
    [data-theme="dark"] {
      --bg: #18181b; --fg: #f4f4f5; --muted: #a1a1aa;
      --card: #27272a; --border: #3f3f46; --accent: #818cf8;
    }
    * { box-sizing: border-box; }
    body { width: 360px; margin: 0; font: 14px system-ui, sans-serif;
           background: var(--bg); color: var(--fg); }
    header { display: flex; align-items: center; justify-content: space-between;
             padding: 12px 14px; border-bottom: 1px solid var(--border); }
    h1 { font-size: 15px; margin: 0; }
    #theme { background: none; border: 1px solid var(--border); border-radius: 8px;
             color: var(--fg); cursor: pointer; padding: 4px 8px; }
    .quick { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 12px 14px; }
    .quick button { background: var(--card); border: 1px solid var(--border); color: var(--fg);
             border-radius: 10px; padding: 10px; cursor: pointer; font-size: 13px; }
    .quick button:hover { border-color: var(--accent); }
    .input { display: flex; gap: 8px; padding: 0 14px 12px; }
    #task { flex: 1; padding: 9px 11px; border-radius: 10px; border: 1px solid var(--border);
            background: var(--bg); color: var(--fg); }
    #go { background: var(--accent); color: #fff; border: none; border-radius: 10px;
          padding: 0 14px; cursor: pointer; }
    #new { background: var(--card); color: var(--fg); border: 1px solid var(--border);
           border-radius: 10px; padding: 0 11px; cursor: pointer; font-size: 15px; }
    #new:hover { border-color: var(--accent); }
    #out code { background: var(--border); padding: 1px 5px; border-radius: 4px; font-size: 12px; }
    #out ul { margin: 4px 0; padding-left: 18px; }
    #out b { color: var(--fg); }
    #out { margin: 0 14px 12px; padding: 12px; background: var(--card); border-radius: 10px;
           min-height: 40px; white-space: pre-wrap; font-size: 13px; line-height: 1.5; max-height: 280px; overflow:auto; }
    .meta { color: var(--muted); font-size: 11px; padding: 0 14px 10px; }
    a { color: var(--accent); }
    .section { padding: 0 14px 10px; }
    .section-title { font-size: 11px; color: var(--muted); margin: 2px 0 6px; font-weight: 600; }
    .section-title .hint { font-weight: 400; opacity: .8; }
    .chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .chips button { background: var(--card); border: 1px solid var(--border); color: var(--fg);
            border-radius: 999px; padding: 5px 10px; cursor: pointer; font-size: 12px; }
    .chips button:hover { border-color: var(--accent); }
    .trow { display: flex; gap: 6px; }
    #lang { flex: 1; padding: 6px 8px; border-radius: 8px; border: 1px solid var(--border);
            background: var(--bg); color: var(--fg); font-size: 13px; }
    #translateBtn { background: var(--accent); color: #fff; border: none; border-radius: 8px;
            padding: 0 12px; cursor: pointer; font-size: 13px; }
    #copyOut { display: none; float: right; background: var(--card); color: var(--fg);
            border: 1px solid var(--border); border-radius: 6px; padding: 2px 8px;
            cursor: pointer; font-size: 11px; margin: -2px 0 4px 6px; }
    #copyOut:hover { border-color: var(--accent); }
  </style>
</head>
<body>
  <header>
    <h1>🧠 Smart Assistant</h1>
    <button id="theme">🌙</button>
  </header>
  <div class="quick">
    <button data-task="Give me the gist and key takeaways of this page">📄 Summarize</button>
    <button data-task="Ask this page a question">💬 Ask this page</button>
    <button data-task="Organize and group my tabs by topic">🗂️ Organize tabs</button>
    <button data-task="How is my focus today?">🎯 Focus check</button>
  </div>

  <div class="section">
    <div class="section-title">✍️ Writing tools <span class="hint">(works on selected text)</span></div>
    <div class="chips" id="writeChips">
      <button data-style="fix">Fix grammar</button>
      <button data-style="concise">Make concise</button>
      <button data-style="professional">Professional</button>
      <button data-style="casual">Casual</button>
      <button data-style="humanize">Humanize</button>
    </div>
  </div>

  <div class="section">
    <div class="section-title">🌐 Translate <span class="hint">(selection or page)</span></div>
    <div class="trow">
      <select id="lang">
        <option>Spanish</option><option>French</option><option>German</option>
        <option>Italian</option><option>Portuguese</option><option>Chinese</option>
        <option>Japanese</option><option>Korean</option><option>Arabic</option>
        <option>Hindi</option><option>Russian</option><option>English</option>
      </select>
      <button id="translateBtn">Translate →</button>
    </div>
  </div>

  <div class="quick" style="padding-top:0">
    <button id="openHumanizer" style="grid-column:1 / -1">✦ Humanize AI &amp; Detector</button>
  </div>
  <div class="meta" style="padding-top:0">Type any task below — if no tool fits, it builds one. <a href="#" id="tools">My tools</a></div>
  <div class="input">
    <button id="new" title="New conversation" style="display:none">↺</button>
    <input id="task" placeholder="Ask anything…" />
    <button id="go">→</button>
  </div>
  <button id="copyOut" title="Copy output">⧉ Copy</button>
  <div id="out">Pick an action or type a request.</div>
  <div class="meta"><span id="prov"></span> · <a href="#" id="opts">Settings</a> · <a href="#" id="retro">Reflect now</a></div>
  <script type="module" src="popup.js"></script>
</body>
</html>
