<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>My Tools — Smart Assistant</title>
  <style>
    :root {
      --bg: #ffffff; --fg: #1a1a1a; --muted: #6b7280;
      --card: #f4f4f5; --border: #e4e4e7; --accent: #4f46e5;
    }
    [data-theme="dark"] {
      --bg: #18181b; --fg: #f4f4f5; --muted: #a1a1aa;
      --card: #27272a; --border: #3f3f46; --accent: #818cf8;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font: 14px system-ui, sans-serif; background: var(--bg); color: var(--fg);
           max-width: 760px; margin: 0 auto; padding: 24px 18px 60px; }
    header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
    h1 { font-size: 20px; margin: 0; }
    .sub { color: var(--muted); margin: 0 0 18px; font-size: 13px; }
    #theme { background: none; border: 1px solid var(--border); border-radius: 8px;
             color: var(--fg); cursor: pointer; padding: 4px 9px; }
    .build { display: flex; gap: 8px; margin-bottom: 20px; }
    .build input { flex: 1; padding: 10px 12px; border-radius: 10px; border: 1px solid var(--border);
            background: var(--bg); color: var(--fg); }
    .build button, .card button { cursor: pointer; }
    .accent { background: var(--accent); color: #fff; border: none; border-radius: 10px; padding: 0 16px; }
    .card { border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; margin-bottom: 12px;
            background: var(--card); }
    .card h3 { margin: 0 0 2px; font-size: 15px; display: flex; align-items: center; gap: 8px; }
    .badge { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 999px;
             background: var(--accent); color: #fff; }
    .badge.op { background: var(--muted); }
    .card .desc { color: var(--muted); font-size: 13px; margin: 0 0 10px; }
    .params { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
    .params input { padding: 6px 9px; border-radius: 8px; border: 1px solid var(--border);
            background: var(--bg); color: var(--fg); font-size: 12px; }
    .row { display: flex; gap: 8px; align-items: center; }
    .ghost { background: var(--bg); color: var(--fg); border: 1px solid var(--border); border-radius: 8px; padding: 6px 12px; }
    .ghost:hover { border-color: var(--accent); }
    .danger { color: #dc2626; border-color: #dc2626; }
    .out { white-space: pre-wrap; font-size: 12px; background: var(--bg); border: 1px solid var(--border);
           border-radius: 8px; padding: 10px; margin-top: 10px; max-height: 240px; overflow: auto; display: none; }
    .empty { color: var(--muted); text-align: center; padding: 40px 0; }
    .steps { font-size: 11px; color: var(--muted); margin: 0 0 10px; font-family: ui-monospace, monospace; }
  </style>
</head>
<body>
  <header>
    <h1>🔧 My Tools</h1>
    <button id="theme">🌙</button>
  </header>
  <p class="sub">Tools the assistant built for you. Describe a new task and it builds one — then run it here anytime.</p>

  <div class="build">
    <input id="buildInput" placeholder="Describe a task to build a tool for… e.g. 'download all PDFs from this Canvas module'" />
    <button class="accent" id="buildBtn">Build</button>
  </div>

  <div id="list"></div>
  <script type="module" src="tools.js"></script>
</body>
</html>
